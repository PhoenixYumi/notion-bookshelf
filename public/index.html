<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RetroNebula's Bookshelf</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --paper: #FDFBF7; --ink: #2C1810; --gold: #C5A059; --shelf: #5D4037; }
        body { background-color: var(--paper); color: var(--ink); font-family: 'Georgia', serif; }
        .book-card { background: white; border: 1px solid #E5E7EB; border-radius: 4px; transition: all 0.3s ease; box-shadow: 2px 2px 0px rgba(0,0,0,0.05); }
        .book-card:hover { transform: translateY(-3px); box-shadow: 4px 4px 15px rgba(0,0,0,0.1); border-color: var(--gold); }
        .status-pill { padding: 2px 10px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; letter-spacing: 0.05em; }
        #bookGrid::-webkit-scrollbar { width: 8px; }
        #bookGrid::-webkit-scrollbar-thumb { background: #D2B48C; border-radius: 4px; }
    </style>
</head>
<body class="p-6">

<div class="max-w-6xl mx-auto">
    <header class="mb-10 pb-6 border-b-4 border-double border-[#5D4037] flex justify-between items-end">
        <div>
            <h1 class="text-4xl font-bold tracking-tighter text-[#3E2723]">RetroNebula's Bookshelf</h1>
            <p id="syncText" class="text-sm font-medium opacity-60 mt-1">Curated Personal Collection</p>
        </div>
        <button onclick="loadFromNotion()" class="bg-[#5D4037] text-[#FDFBF7] px-6 py-2 rounded shadow hover:bg-[#3E2723] transition-colors flex items-center gap-2">
            <span>📚</span> Refresh Library
        </button>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
        <aside class="lg:col-span-3">
            <div class="bg-white p-6 rounded border border-stone-200 shadow-sm sticky top-6">
                <h2 class="text-lg font-bold mb-6 flex items-center gap-2 border-b pb-2">
                    <span>📈</span> Reading Stats
                </h2>
                <div style="height: 250px;"><canvas id="statusChart"></canvas></div>
            </div>
        </aside>

        <main class="lg:col-span-9">
            <div class="mb-6 relative">
                <input type="text" id="searchInput" oninput="handleSearch()" placeholder="Search by title or author..." 
                       class="w-full border-2 border-stone-200 rounded-md p-4 pl-12 focus:border-stone-400 outline-none transition-all italic">
                <span class="absolute left-4 top-4 opacity-30 text-xl">🔍</span>
            </div>
            
            <div id="bookGrid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6 h-[75vh] overflow-y-auto pr-4">
                </div>
        </main>
    </div>
</div>

<script>
    const API_URL = "/api"; 
    let bookData = [];
    let chartInstance = null;

    window.onload = loadFromNotion;

    async function loadFromNotion() {
        console.log("Contacting the library stacks...");
        const grid = document.getElementById("bookGrid");
        const syncText = document.getElementById("syncText");
        
        grid.innerHTML = `
            <div class="col-span-full flex flex-col items-center justify-center py-24 text-stone-400">
                <div class="animate-bounce text-4xl mb-4">🕯️</div>
                <div class="italic">Browsing the shelves...</div>
            </div>`;

        try {
            const resp = await fetch(API_URL);
            if (!resp.ok) throw new Error(`Notion connection failed (${resp.status})`);

            const data = await resp.json();
            
            bookData = (data.results || []).map(page => ({
                id: page.id,
                title: page.properties.Title?.title?.[0]?.plain_text || "Untitled",
    // This handles the Multi-select format for Authors
                author: page.properties.Author?.multi_select?.map(a => a.name).join(", ") || "Unknown Author",
                status: page.properties.Status?.select?.name || "To Read",
        dateFinished: page.properties["Date finished"]?.date?.start || null
            }));

            syncText.innerText = `✨ ${bookData.length} volumes indexed`;
            render();
        } catch (err) {
            console.error(err);
            grid.innerHTML = `<div class="col-span-full p-6 bg-red-50 text-red-800 rounded border border-red-100 italic text-center">Error: ${err.message}</div>`;
        }
    }

    function render(data = bookData) {
        const grid = document.getElementById("bookGrid");
        grid.innerHTML = "";
        
        data.sort((a, b) => {
            if (a.dateFinished && b.dateFinished) return new Date(b.dateFinished) - new Date(a.dateFinished);
            return a.title.localeCompare(b.title);
        }).forEach(book => {
            const card = document.createElement("div");
            card.className = "book-card p-5 flex flex-col justify-between min-h-[180px]";
            const dateStr = book.dateFinished ? new Date(book.dateFinished).toLocaleDateString() : "In Progress";

            card.innerHTML = `
                <div>
                    <div class="flex justify-between items-start mb-3">
                        <span class="status-pill ${getPill(book.status)}">${book.status}</span>
                    </div>
                    <h3 class="font-bold text-lg leading-tight text-stone-800 line-clamp-2">${book.title}</h3>
                    <p class="text-sm text-stone-500 italic mt-1 font-serif">by ${book.author}</p>
                </div>
                <div class="mt-4 pt-3 border-t border-stone-50 flex justify-between items-center">
                    <span class="text-[10px] uppercase font-bold tracking-widest text-stone-400">Status</span>
                    <span class="text-[11px] font-medium text-stone-600">${dateStr}</span>
                </div>
            `;
            grid.appendChild(card);
        });
        updateChart(data);
    }

    function getPill(s) {
        const st = (s || "").toLowerCase();
        if (st.includes("reading")) return "bg-amber-100 text-amber-800";
        if (st.includes("read") || st.includes("done")) return "bg-emerald-100 text-emerald-800";
        return "bg-stone-100 text-stone-600 border border-stone-200";
    }

    function handleSearch() {
        const term = document.getElementById("searchInput").value.toLowerCase();
        const filtered = bookData.filter(b => 
            b.title.toLowerCase().includes(term) || b.author.toLowerCase().includes(term)
        );
        render(filtered);
    }
    
    function updateChart(data) {
        const ctx = document.getElementById('statusChart').getContext('2d');
        const counts = data.reduce((acc, book) => {
            acc[book.status] = (acc[book.status] || 0) + 1;
            return acc;
        }, {});

        if (chartInstance) chartInstance.destroy();
        chartInstance = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: Object.keys(counts),
                datasets: [{
                    data: Object.values(counts),
                    backgroundColor: ['#C5A059', '#5D4037', '#A1887F', '#D2B48C'],
                    borderWidth: 0
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { position: 'bottom', labels: { font: { family: 'Georgia' } } } }
            }
        });
    }
</script>
</body>
</html>
